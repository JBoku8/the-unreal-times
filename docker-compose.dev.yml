services:
  app:
    environment:
      CI: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev"

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
